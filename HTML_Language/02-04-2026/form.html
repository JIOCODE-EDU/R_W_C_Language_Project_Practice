<!doctype html>
<html lang="en">
	<head>
		<title>Html Lecture</title>
	</head>
	<body>
		<!--Form Element in HTML-->

		<form style="width:500px; background: red;">
			<fieldset>
				<legend>Employee Details</legend>
				<label>FirstName:</label>
				<input type="text" name="" style="margin-bottom:20px"><br>
				<label>LastName:</label>
				<input type="text" name="" style="margin-bottom:20px"><br>
				<label> <input type="radio" name=""> Male </label>
				<label> <input type="radio" name="" style="margin-bottom:20px"> Female </label><br>
				<label>Employee ID:</label>
				<input type="number" name="" style="margin-bottom:20px"><br>
				<label>Designation:</label>
				<input type="text" name="" style="margin-bottom:20px"><br>
				<label>Phone Number:</label>
				<input type="tel" name="" style="margin-bottom:20px"><br>
				<button type="submit">submit</button>
			</fieldset>
		</form>


		<form style="width:500px; background: red;">
			<fieldset>
				<legend>Registration</legend>
				<label>Name:</label>
				<input type="text" name="" style="margin-bottom:20px"><br>
				<label>Password</label>
				<input type="password" name="" style="margin-bottom:20px"><br>
				<label>E-mail:</label>
				<input type="email" name="" style="margin-bottom:20px"><br>
				<label>Phone Number:</label>
				<input type="tel" name="" style="margin-bottom:20px"><br>
				<label>Sex:</label>
				<label> <input type="radio" name=""> Male </label>
				<label> <input type="radio" name="" style="margin-bottom:20px"> Female </label><br>
				<label>D_O_B:</label>
				<input type="date" name="" style="margin-bottom:20px"><br>
				<label>Language Known:</label>
				<label>
					Telugu
					<input type="checkbox" name="">
				</label>
				<label>
					English
					<input type="checkbox" name="">
				</label>
				<label>
					Tamil
					<input type="checkbox" name="">
				</label>
				<label>
					Hindi
					<input type="checkbox" name="" style="margin-bottom:20px">
				</label><br>
				<label>Address:</label>
				<textarea style="margin-bottom:20px"></textarea ><br>
				<button type="submit">submit</button>
				<button type="reset">reset</button>
			</fieldset>
		</form>
	</body>
</html>
